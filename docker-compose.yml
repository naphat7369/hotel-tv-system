version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hotel_tv_db
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASS:-pass}
      POSTGRES_DB: ${DB_NAME:-hotel_tv}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/migrations/init-schema.sql:/docker-entrypoint-initdb.d/init-schema.sql
    restart: always

  redis:
    image: redis:7-alpine
    container_name: hotel_tv_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata:
